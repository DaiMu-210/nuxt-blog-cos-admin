main:
  push:
    - name: build-and-deploy
      docker:
        image: node:22
        volumes:
          - node_modules
          - .pnpm-store
      stages:
        - name: install
          script: |
            corepack enable
            pnpm config set store-dir .pnpm-store
            pnpm install --frozen-lockfile
        - name: generate
          script: |
            pnpm run generate:dist
        - name: upload-to-cos
          image: ubuntu:22.04
          script: |
            set -e
            apt-get update
            apt-get install -y --no-install-recommends ca-certificates wget
            wget -O /usr/local/bin/coscli https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux-amd64
            chmod 755 /usr/local/bin/coscli

            # 需要在 CNB 的变量/密钥中配置：
            # COS_BUCKET 例如：examplebucket-1250000000
            # COS_REGION 例如：ap-guangzhou
            # COS_SECRET_ID / COS_SECRET_KEY
            : "${COS_BUCKET:?Missing COS_BUCKET}"
            : "${COS_REGION:?Missing COS_REGION}"
            : "${COS_SECRET_ID:?Missing COS_SECRET_ID}"
            : "${COS_SECRET_KEY:?Missing COS_SECRET_KEY}"

            coscli sync ./dist "cos://${COS_BUCKET}/" -r --delete \
              --init-skip=true \
              -i "${COS_SECRET_ID}" -k "${COS_SECRET_KEY}" \
              -e "cos.${COS_REGION}.myqcloud.com"

